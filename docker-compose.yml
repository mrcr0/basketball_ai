version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: basketball-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=basketball_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - basketball-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: basketball-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/basketball_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - APP_FRONTEND_URL=http://localhost
      - JAVA_OPTS=-Xms256m -Xmx512m
    depends_on:
      - mysql
    networks:
      - basketball-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: basketball-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - basketball-net

volumes:
  mysql_data:

networks:
  basketball-net:
    driver: bridge